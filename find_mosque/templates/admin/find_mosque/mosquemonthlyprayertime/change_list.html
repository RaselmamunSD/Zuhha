{% extends "admin/change_list.html" %}
{% load i18n %}

{% block extrahead %}
{{ block.super }}
<style>
  @keyframes btn-glow {
    0%   { box-shadow: 0 0 6px 0 rgba(22,163,74,.55); }
    50%  { box-shadow: 0 0 18px 4px rgba(22,163,74,.75), 0 0 32px 8px rgba(16,185,129,.35); }
    100% { box-shadow: 0 0 6px 0 rgba(22,163,74,.55); }
  }

  .month-timetable-btn {
    display:         inline-flex;
    align-items:     center;
    gap:             8px;
    padding:         9px 20px;
    background:      linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);
    color:           #fff !important;
    font-size:       13.5px;
    font-weight:     700;
    letter-spacing:  .3px;
    border-radius:   10px;
    border:          none;
    text-decoration: none !important;
    white-space:     nowrap;
    box-shadow:      0 3px 10px rgba(5,150,105,.45), 0 1px 3px rgba(0,0,0,.12);
    animation:       btn-glow 2.4s ease-in-out infinite;
    transition:      transform .18s ease, box-shadow .18s ease, background .18s ease;
    position:        relative;
    overflow:        hidden;
  }

  .month-timetable-btn::before {
    content:    '';
    position:   absolute;
    top:        0; left: -75%;
    width:      50%;
    height:     100%;
    background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,.28) 50%, transparent 100%);
    transform:  skewX(-20deg);
    transition: left .55s ease;
  }

  .month-timetable-btn:hover::before { left: 130%; }

  .month-timetable-btn:hover {
    transform:   translateY(-2px) scale(1.03);
    background:  linear-gradient(135deg, #047857 0%, #059669 50%, #10b981 100%);
    box-shadow:  0 6px 20px rgba(5,150,105,.55), 0 2px 6px rgba(0,0,0,.15);
    animation:   none;
  }

  .month-timetable-btn:active {
    transform: translateY(0) scale(.98);
    box-shadow: 0 2px 6px rgba(5,150,105,.4);
  }

  .month-timetable-btn .btn-icon {
    font-size:   16px;
    line-height: 1;
    filter:      drop-shadow(0 1px 2px rgba(0,0,0,.25));
  }

  .month-timetable-btn .btn-badge {
    background:    rgba(255,255,255,.22);
    border:        1px solid rgba(255,255,255,.35);
    border-radius: 20px;
    padding:       1px 7px;
    font-size:     11px;
    font-weight:   600;
    letter-spacing:.2px;
    backdrop-filter: blur(4px);
  }
</style>
{% endblock %}

{% block object-tools-items %}
  <li>
    <a href="bulk-add/" class="month-timetable-btn">
      <span class="btn-icon">📅</span>
      {% trans "Add Full Month Timetable" %}
      <span class="btn-badge">NEW</span>
    </a>
  </li>
  {{ block.super }}
{% endblock %}
